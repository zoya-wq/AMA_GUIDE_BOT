version: "3.9"

services:
  ama-guide:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ama-guide-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      # Persist any temp / cache files written at runtime
      - ama_tmp:/tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ama_tmp:
